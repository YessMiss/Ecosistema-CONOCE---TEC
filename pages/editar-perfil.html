<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONOCE-TEC - Editar Perfil</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS personalizado -->
    <link rel="stylesheet" href="../css/styles-editar-perfil.css">
</head>
<body>
    <!-- Header -->
    <header class="header-dashboard">
        <div class="container-fluid">
            <div class="header-content">
                <!-- Botón Atrás -->
                <button class="btn-back" onclick="window.history.back()" title="Volver atrás">
                    <i class="fas fa-arrow-left"></i>
                </button>

                <!-- Logo y Título -->
                <div class="header-logo">
                    <div class="logo-circle-small">CT</div>
                    <div class="header-text">
                        <h1>CONOCE-TEC</h1>
                        <p>Instituto Tecnológico de Minatitlán</p>
                    </div>
                </div>

                <!-- Botón Cerrar Sesión -->
                <div class="header-right">
                    <button class="btn-logout" id="btnLogout" title="Cerrar Sesión">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Salir</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenedor Principal -->
    <div class="main-container">
        <!-- Contenido de Edición -->
        <div class="edit-container">
            <!-- Tarjeta de Edición -->
            <div class="edit-card">
                <h2 class="edit-title">Editar Perfil</h2>
                <p class="edit-subtitle">Actualiza tu información personal</p>

                <!-- Formulario de Edición -->
                <form id="formEditarPerfil" class="edit-form">
                    <!-- Sección: Información Personal -->
                    <div class="form-section">
                        <h4 class="section-header">Información Personal</h4>
                        
                        <div class="form-group">
                            <label for="editNombre" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="editNombre" placeholder="Ingresa tu nombre completo" required>
                        </div>

                        <div class="form-group">
                            <label for="editCorreo" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="editCorreo" placeholder="Ingresa tu correo" required>
                        </div>

                        <div class="form-group">
                            <label for="editTelefono" class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" id="editTelefono" placeholder="Ingresa tu teléfono">
                        </div>
                    </div>

                    <!-- Sección: Información Académica -->
                    <div class="form-section">
                        <h4 class="section-header">Información Académica</h4>
                        
                        <div class="form-group">
                            <label for="editMatricula" class="form-label">Número de Control</label>
                            <input type="text" class="form-control" id="editMatricula"
                                placeholder="Ej: 21181916001">
                        </div>

                        <div class="form-group">
                            <label for="editCarrera" class="form-label">Carrera</label>
                            <select class="form-control" id="editCarrera">
                                <option value="">Selecciona una carrera</option>
                                <option value="Ingeniería en Gestión Empresarial">Ingeniería en Gestión Empresarial</option>
                                <option value="Ingeniería Electromecánica">Ingeniería Electromecánica</option>
                                <option value="Ingeniería en Sistemas Computacionales">Ingeniería en Sistemas Computacionales</option>
                                <option value="Ingeniería Electrónica">Ingeniería Electrónica</option>
                                <option value="Ingeniería Ambiental">Ingeniería Ambiental</option>
                                <option value="Ingeniería Industrial">Ingeniería Industrial</option>
                                <option value="Ingeniería Química">Ingeniería Química</option>
                                <option value="Licenciatura en Administración">Licenciatura en Administración</option>
                                <option value="Ingeniería en Inteligencia Artificial">Ingeniería en Inteligencia Artificial</option>
                                <option value="Ingeniería en Desarrollo de Aplicaciones">Ingeniería en Desarrollo de Aplicaciones</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="editSemestre" class="form-label">Semestre</label>
                            <select class="form-control" id="editSemestre">
                                <option value="">Selecciona un semestre</option>
                                <option value="1° Semestre">1° Semestre</option>
                                <option value="2° Semestre">2° Semestre</option>
                                <option value="3° Semestre">3° Semestre</option>
                                <option value="4° Semestre">4° Semestre</option>
                                <option value="5° Semestre">5° Semestre</option>
                                <option value="6° Semestre">6° Semestre</option>
                                <option value="7° Semestre">7° Semestre</option>
                                <option value="8° Semestre">8° Semestre</option>
                                <option value="9° Semestre">9° Semestre</option>
                                <option value="10° Semestre">10° Semestre</option>
                                <option value="11° Semestre">11° Semestre</option>
                                <option value="12° Semestre">12° Semestre</option>
                            </select>
                        </div>
                    </div>

                    <!-- Sección: Información de Contacto -->
                    <div class="form-section">
                        <h4 class="section-header">Información de Contacto</h4>
                        
                        <div class="form-group">
                            <label for="editTelefonoEmergencia" class="form-label">Teléfono de Emergencia</label>
                            <input type="tel" class="form-control" id="editTelefonoEmergencia" placeholder="Teléfono de emergencia">
                        </div>

                        <div class="form-group">
                            <label for="editDireccion" class="form-label">Dirección</label>
                            <input type="text" class="form-control" id="editDireccion" placeholder="Ingresa tu dirección">
                        </div>

                        <div class="form-group">
                            <label for="editCiudad" class="form-label">Ciudad</label>
                            <input type="text" class="form-control" id="editCiudad" placeholder="Ingresa tu ciudad">
                        </div>
                    </div>

                    <!-- Sección: Cambiar Contraseña -->
                    <div class="form-section">
                        <h4 class="section-header">Cambiar Contraseña</h4>
                        <p class="section-desc">Deja en blanco si no deseas cambiar tu contraseña.</p>

                        <div class="form-group">
                            <label for="editContrasenaActual" class="form-label">Contraseña Actual</label>
                            <div class="input-password-wrap">
                                <input type="password" class="form-control" id="editContrasenaActual"
                                    placeholder="Ingresa tu contraseña actual" maxlength="30">
                                <button type="button" class="btn-toggle-pw" data-target="editContrasenaActual" title="Mostrar/ocultar">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="editContrasenaNueva" class="form-label">Nueva Contraseña</label>
                            <div class="input-password-wrap">
                                <input type="password" class="form-control" id="editContrasenaNueva"
                                    placeholder="Mínimo 6 caracteres, máximo 30" maxlength="30">
                                <button type="button" class="btn-toggle-pw" data-target="editContrasenaNueva" title="Mostrar/ocultar">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <small class="form-text text-muted" id="pwStrengthMsg"></small>
                        </div>

                        <div class="form-group">
                            <label for="editContrasenaConfirmar" class="form-label">Confirmar Nueva Contraseña</label>
                            <div class="input-password-wrap">
                                <input type="password" class="form-control" id="editContrasenaConfirmar"
                                    placeholder="Repite la nueva contraseña" maxlength="30">
                                <button type="button" class="btn-toggle-pw" data-target="editContrasenaConfirmar" title="Mostrar/ocultar">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <small class="form-text" id="pwMatchMsg"></small>
                        </div>
                    </div>

                    <!-- Botones de Acción -->
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="window.history.back()">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JavaScript personalizado -->
    <script src="../js/script-editar-perfil.js"></script>
</body>
</html>
