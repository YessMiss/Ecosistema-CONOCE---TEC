    <style>
        /* Ajuste de color primario para tono admin (azul oscuro) */
        :root {
            --color-primary: #1e2a5a;
            --color-secondary: #2d4499;
        }
        .btn-primary { background: linear-gradient(135deg, #1e2a5a, #2d4499); border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #162044, #1e3080); }
        .header-dashboard { background: linear-gradient(135deg, #1e2a5a 0%, #2d4499 100%); }
        .section-header { color: #1e2a5a; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header-dashboard">
        <div class="container-fluid">
            <div class="header-content">
                <button class="btn-back" onclick="window.history.back()" title="Volver atrás">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="header-logo">
                    <div class="logo-circle-small">CT</div>
                    <div class="header-text">
                        <h1>CONOCE-TEC</h1>
                        <p>Panel de Administrador</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn-logout" id="btnLogout" title="Cerrar Sesión">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Salir</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenedor Principal -->
    <div class="main-container">
        <div class="edit-container">
            <div class="edit-card">
                <h2 class="edit-title">Editar Perfil de Administrador</h2>
                <p class="edit-subtitle">Actualiza tu información personal y de acceso</p>

                <form id="formEditarPerfilAdmin" class="edit-form">

                    <!-- Información Personal -->
                    <div class="form-section">
                        <h4 class="section-header">Información Personal</h4>

                        <div class="form-group">
                            <label for="adminEditNombre" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="adminEditNombre" placeholder="Nombre completo" required>
                        </div>

                        <div class="form-group">
                            <label for="adminEditCorreo" class="form-label">Correo Institucional</label>
                            <input type="email" class="form-control" id="adminEditCorreo" placeholder="correo@tec.edu.mx">
                        </div>
                    </div>

                    <!-- Información Institucional -->
                    <div class="form-section">
                        <h4 class="section-header">Información Institucional</h4>

                        <div class="form-group">
                            <label for="adminEditEmpleado" class="form-label">Número de Empleado / ID</label>
                            <input type="text" class="form-control" id="adminEditEmpleado" placeholder="Número de empleado o ID" maxlength="20">
                        </div>

                        <div class="form-group">
                            <label for="adminEditArea" class="form-label">Área o Departamento</label>
                            <input type="text" class="form-control" id="adminEditArea" placeholder="Área o departamento">
                        </div>

                        <div class="form-group">
                            <label for="adminEditRol" class="form-label">Rol</label>
                            <select class="form-control" id="adminEditRol">
                                <option value="">Selecciona un rol</option>
                                <option value="Administrador">Administrador</option>
                                <option value="Editor">Editor</option>
                                <option value="Supervisor">Supervisor</option>
                                <option value="Soporte Técnico">Soporte Técnico</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="adminEditUsuario" class="form-label">Nombre de usuario</label>
                            <input type="text" class="form-control" id="adminEditUsuario" placeholder="Nombre de usuario">
                        </div>
                    </div>

                    <!-- Botones -->
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="window.history.back()">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script-editar-perfil-admin.js"></script>
</body>
</html>
